name: Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt update -qq
          sudo apt install -y -qq build-essential debhelper dh-python python3-all dpkg-dev

      - name: Build .deb
        run: |
          make clean 2>/dev/null || true
          make deb

      - name: Extract changelog for release notes
        run: |
          mkdir -p dist
          sed -n '/^novapm (/,/^ -- /p' debian/changelog | head -n -1 > dist/release-notes.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/novapm_*.deb
          body_path: dist/release-notes.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
