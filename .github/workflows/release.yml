name: Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt update -qq
          sudo apt install -y -qq build-essential debhelper dh-python python3-all dpkg-dev

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import 2>&1
          echo "GPG key imported"
          gpg --list-keys "Nexus Develop Company"

      - name: Build .deb
        run: |
          make clean 2>/dev/null || true
          make deb

      - name: Extract changelog for release notes
        run: |
          mkdir -p dist
          sed -n '/^novapm (/,/^ -- /p' debian/changelog | head -n -1 > dist/release-notes.txt
          echo "Release notes:"
          cat dist/release-notes.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/novapm_*.deb
            data/novapm.gpg
          body_path: dist/release-notes.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update APT repo
        run: |
          git fetch origin gh-pages 2>/dev/null || true
          rm -rf /tmp/gh-pages
          git worktree add /tmp/gh-pages gh-pages 2>/dev/null || {
            mkdir -p /tmp/gh-pages/apt
            cd /tmp/gh-pages
            git init
            git checkout -b gh-pages
            mkdir -p apt/pool/main/n/novapm apt/dists/stable/main/binary-all apt/dists/stable/main/binary-amd64
          }
          cp dist/novapm_*.deb /tmp/gh-pages/apt/pool/main/n/novapm/
          cp data/novapm.gpg /tmp/gh-pages/apt/
          cd /tmp/gh-pages/apt
          dpkg-scanpackages . /dev/null | sed 's|Filename: \./|Filename: |' | gzip -9c > dists/stable/main/binary-all/Packages.gz
          mkdir -p dists/stable/main/binary-amd64
          cp dists/stable/main/binary-all/Packages.gz dists/stable/main/binary-amd64/Packages.gz
          cd dists/stable
          MD5_ALL=$(md5sum main/binary-all/Packages.gz | awk '{print $1}')
          SHA1_ALL=$(sha1sum main/binary-all/Packages.gz | awk '{print $1}')
          SHA256_ALL=$(sha256sum main/binary-all/Packages.gz | awk '{print $1}')
          SIZE_ALL=$(stat -c%s main/binary-all/Packages.gz 2>/dev/null || stat -f%z main/binary-all/Packages.gz)
          MD5_AMD64=$(md5sum main/binary-amd64/Packages.gz | awk '{print $1}')
          SHA1_AMD64=$(sha1sum main/binary-amd64/Packages.gz | awk '{print $1}')
          SHA256_AMD64=$(sha256sum main/binary-amd64/Packages.gz | awk '{print $1}')
          SIZE_AMD64=$(stat -c%s main/binary-amd64/Packages.gz 2>/dev/null || stat -f%z main/binary-amd64/Packages.gz)
          printf 'Origin: NovaProxy Manager\nLabel: NovaProxy Manager APT Repository\nSuite: stable\nCodename: stable\nArchitectures: all amd64\nComponents: main\nDescription: APT repository for NovaProxy Manager\nDate: %s\nMD5Sum:\n %s %s main/binary-all/Packages.gz\n %s %s main/binary-amd64/Packages.gz\nSHA1:\n %s %s main/binary-all/Packages.gz\n %s %s main/binary-amd64/Packages.gz\nSHA256:\n %s %s main/binary-all/Packages.gz\n %s %s main/binary-amd64/Packages.gz\n' "$(date -Ru)" "$MD5_ALL" "$SIZE_ALL" "$MD5_AMD64" "$SIZE_AMD64" "$SHA1_ALL" "$SIZE_ALL" "$SHA1_AMD64" "$SIZE_AMD64" "$SHA256_ALL" "$SIZE_ALL" "$SHA256_AMD64" "$SIZE_AMD64" > Release
          echo "${{ secrets.GPG_PASSPHRASE }}" | gpg --batch --yes --passphrase-fd 0 \
            --pinentry-mode loopback --clearsign -o InRelease Release 2>&1
          echo "${{ secrets.GPG_PASSPHRASE }}" | gpg --batch --yes --passphrase-fd 0 \
            --pinentry-mode loopback --detach-sign -o Release.gpg Release 2>&1

      - name: Push gh-pages
        run: |
          cd /tmp/gh-pages
          git config user.name "Nexus Develop Company"
          git config user.email "marcosjaviersantana300302@gmail.com"
          git add -A
          git commit -m "Auto-release: ${{ github.ref_name }}" 2>/dev/null || echo "Nothing to commit"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git 2>/dev/null || \
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push origin gh-pages --force 2>&1
